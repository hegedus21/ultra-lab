name: Daily Content Pipeline

on:
  schedule:
    - cron: "0 5 * * *" # Minden nap reggel 5:00 UTC (7:00 magyar idő)
  workflow_dispatch: # Kézzel is futtatható

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run channel pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YT_PROXY_URL: ${{ secrets.YT_PROXY_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AI_PUBLISH_SECRET: ${{ secrets.AI_PUBLISH_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: npx tsx scripts/channel-pipeline.ts
